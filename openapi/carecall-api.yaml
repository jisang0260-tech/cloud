openapi: 3.0.1
info:
  title: Carecall API
  version: '2026-05-27'
  description: |
    Carecall 대시보드용 API 명세입니다.

servers:
  - url: https://esv5aiiwjg.execute-api.us-east-1.amazonaws.com/{basePath}
    description: 배포된 API Gateway 엔드포인트
    variables:
      basePath:
        default: khu
tags:
  - name: Recipients
    description: 대상자 조회 및 등록
  - name: Calls
    description: 통화 현황 및 통화 이력 조회
paths:
  /api/recipients:
    get:
      tags:
        - Recipients
      summary: 대상자 목록 조회
      description: |
        저장된 대상자 목록을 조회합니다.

        반환되는 `phoneNumber`는 화면 표시용으로 하이픈이 포함된 형식(`010-1234-1234`)으로 보정될 수 있습니다.
      operationId: fetchRecipients
      responses:
        '200':
          description: 대상자 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipientsResponse'
              examples:
                success:
                  summary: 조회 성공 예시
                  value:
                    recipients:
                      - recipientId: r-ab12cd34ef56
                        recipientName: 박지상
                        phoneNumber: 010-3089-0260
                        age: 23
                        address: 서울시 동대문구
                        assignedWorker: ''
                        lastRiskLevel: 정상
                        autoCallEnabled: true
                        autoCallTime: '09:00'
                        memo: ''
                        photo: null
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Recipients
      summary: 대상자 등록
      description: |
        새 대상자를 등록합니다. recipientId 는 자동으로 생성

        주의사항:
        - `autoCallTime`은 반드시 `HH:MM` 형식이어야 합니다. 예: `09:00`
        - `autoCallEnabled`는 문자열이 아니라 JSON boolean 값이어야 합니다. 예: `true`
        - `phoneNumber`는 현재 구현상 비어있지만 않으면 저장되며, `010-1234-1234`와 `01012341234` 모두 허용됩니다.
        - 실행시 실제로 다이나모db에 적재가 됩니다. 
      operationId: postRecipient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipientRequest'
            examples:
              createRecipient:
                summary: 등록 요청 예시
                value:
                  recipientName: 박지상
                  age: 23
                  phoneNumber: 010-3089-0260
                  address: 서울시 동대문구
                  memo: 보호자 연락처 확인 필요
                  autoCallTime: '09:00'
                  autoCallEnabled: true
      responses:
        '201':
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              examples:
                success:
                  value:
                    status: success
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusErrorResponse'
              examples:
                invalidTime:
                  summary: 시간 형식 오류
                  value:
                    status: error
                    message: autoCallTime must use HH:MM format.
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusErrorResponse'
  /api/calls/today:
    get:
      tags:
        - Calls
      summary: 오늘 통화 현황 조회
      description: |
        지정한 날짜의 통화 현황을 조회합니다.

        - `date`를 생략하면 서버 기준 `Asia/Seoul`의 오늘 날짜를 사용합니다.
        - 현재 구현은 `createdAt` 기준으로 날짜를 조회합니다.
      operationId: fetchTodayCallStatus
      parameters:
        - name: date
          in: query
          required: false
          description: 조회할 날짜 (`YYYY-MM-DD`). 생략 시 한국 시간 기준 오늘 날짜.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          example: '2026-05-27'
      responses:
        '200':
          description: 통화 현황 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayCallStatusResponse'
              examples:
                success:
                  value:
                    date: '2026-05-27'
                    total: 1
                    riskCounts:
                      정상: 1
                      주의: 0
                      위험: 0
                      미응답: 0
                    records:
                      - contactId: 7054cc97-636c-448b-b421-3c22a01277df
                        recipientId: '123456'
                        recipientName: 박지상
                        status: 응답
                        duration: 6
                        callTime: '2026-05-27T09:03:00+09:00'
                        sentiment: MIXED
                        sentimentScore: 96
                        riskLevel: 정상
                        riskReason: 특별한 건강 우려 사항 없음.
                        summary: 현재 건강 상태는 양호함.
                        conversation: []
                        createdAt: '2026-05-27'
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/calls/history/{recipientName}:
    get:
      tags:
        - Calls
      summary: 대상자 통화 이력 조회
      description: |
        대상자의 통화 이력을 최신순으로 조회합니다. 초기 구현은 recipientId 였으나, 
        vercel 앱 기준으로 이름 검색으로 보여 recipientName 으로 구현했습니다.

        중요:
        - 현재 경로 변수 이름은 `recipientId`이지만, 실제 Lambda 구현은 **이 값을 대상자 이름으로 사용하여 조회**합니다.
        - 예를 들어 `박지상`의 이력을 보려면 `/api/calls/history/박지상` 형태로 호출해야 합니다.
        - 한글 이름은 브라우저/클라이언트에서 자동 URL 인코딩되어도 정상 처리됩니다.
      operationId: fetchCallHistory
      parameters:
        - name: recipientId
          in: path
          required: true
          description: |
            현재 구현상 실제 조회값은 대상자 이름입니다.
            예: `박지상`
          schema:
            type: string
          example: 박지상
      responses:
        '200':
          description: 통화 이력 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallHistoryResponse'
              examples:
                success:
                  value:
                    recipientName: 박지상
                    history:
                      - contactId: 7054cc97-636c-448b-b421-3c22a01277df
                        recipientId: '123456'
                        recipientName: 박지상
                        status: 응답
                        duration: 6
                        callTime: '2026-05-27T09:03:00+09:00'
                        sentiment: MIXED
                        sentimentScore: 96
                        riskLevel: 정상
                        riskReason: 특별한 건강 우려 사항 없음.
                        summary: 현재 건강 상태는 양호함.
                        conversation:
                          - speaker: AI
                            text: 안녕하세요 박지상님. 오늘 식사는 하셨나요?
                          - speaker: 대상자
                            text: 네, 아침은 먹었습니다.
                        createdAt: '2026-05-27'
                empty:
                  summary: 이력 없음
                  value:
                    recipientName: 박지상
                    history: []
        '400':
          description: 필수 경로값 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingName:
                  value:
                    error: recipientName is required
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    RecipientsResponse:
      type: object
      required:
        - recipients
      properties:
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/Recipient'
    Recipient:
      type: object
      required:
        - recipientId
        - recipientName
        - phoneNumber
        - age
        - address
        - autoCallEnabled
        - autoCallTime
        - memo
      properties:
        recipientId:
          type: string
          description: 대상자 고유 ID
          example: r-ab12cd34ef56
        recipientName:
          type: string
          description: 대상자 이름
          example: 박지상
        phoneNumber:
          type: string
          description: 화면 표시용 전화번호
          example: 010-3089-0260
        age:
          type: integer
          description: 나이
          example: 23
        address:
          type: string
          description: 주소
          example: 서울시 동대문구
        assignedWorker:
          type: string
          nullable: true
          description: 담당자 이름
          example: ''
        lastRiskLevel:
          type: string
          nullable: true
          description: 마지막 위험도
          enum:
            - 정상
            - 주의
            - 위험
            - 미응답
          example: 정상
        autoCallEnabled:
          type: boolean
          description: 자동 안부 전화 활성화 여부
          example: true
        autoCallTime:
          type: string
          description: 자동 안부 전화 시간 (`HH:MM`)
          example: '09:00'
        memo:
          type: string
          description: 메모
          example: 보호자 연락처 확인 필요
        photo:
          type: string
          nullable: true
          description: 프로필 사진 URL 또는 null
    CreateRecipientRequest:
      type: object
      required:
        - recipientName
        - age
        - phoneNumber
        - address
        - memo
        - autoCallTime
        - autoCallEnabled
      properties:
        recipientName:
          type: string
          description: 대상자 이름
          example: 박지상
        age:
          type: integer
          minimum: 0
          description: 나이
          example: 23
        phoneNumber:
          type: string
          description: 전화번호. 현재 구현상 비어있지만 않으면 저장됩니다.
          example: 010-3089-0260
        address:
          type: string
          description: 주소
          example: 서울시 동대문구
        memo:
          type: string
          description: 메모
          example: 보호자 연락처 확인 필요
        autoCallTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
          description: 자동 안부 전화 시간 (`HH:MM`)
          example: '09:00'
        autoCallEnabled:
          type: boolean
          description: 자동 안부 전화 활성화 여부
          example: true
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success
    StatusErrorResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: autoCallTime must use HH:MM format.
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Internal server error
    TodayCallStatusResponse:
      type: object
      required:
        - date
        - total
        - riskCounts
        - records
      properties:
        date:
          type: string
          description: 조회 기준 날짜
          example: '2026-05-27'
        total:
          type: integer
          description: 전체 통화 건수
          example: 1
        riskCounts:
          $ref: '#/components/schemas/RiskCounts'
        records:
          type: array
          items:
            $ref: '#/components/schemas/CallRecord'
    RiskCounts:
      type: object
      required:
        - 정상
        - 주의
        - 위험
        - 미응답
      properties:
        정상:
          type: integer
          example: 1
        주의:
          type: integer
          example: 0
        위험:
          type: integer
          example: 0
        미응답:
          type: integer
          example: 0
    CallHistoryResponse:
      type: object
      required:
        - recipientName
        - history
      properties:
        recipientName:
          type: string
          description: 조회 기준 대상자 이름
          example: 박지상
        history:
          type: array
          items:
            $ref: '#/components/schemas/CallRecord'
    CallRecord:
      type: object
      required:
        - contactId
        - recipientId
        - recipientName
        - status
        - riskLevel
        - riskReason
        - summary
        - conversation
        - createdAt
      properties:
        contactId:
          type: string
          description: Amazon Connect Contact ID
          example: 7054cc97-636c-448b-b421-3c22a01277df
        recipientId:
          type: string
          description: 대상자 ID
          example: '123456'
        recipientName:
          type: string
          description: 대상자 이름
          example: 박지상
        status:
          type: string
          description: 통화 상태
          example: 응답
        duration:
          type: integer
          nullable: true
          description: 통화 시간(분 단위)
          example: 6
        callTime:
          type: string
          nullable: true
          description: 통화 시각(ISO 8601)
          example: '2026-05-27T09:03:00+09:00'
        sentiment:
          type: string
          nullable: true
          description: 감정 분석 결과
          enum:
            - POSITIVE
            - NEGATIVE
            - NEUTRAL
            - MIXED
          example: MIXED
        sentimentScore:
          type: integer
          nullable: true
          description: 감정 점수
          example: 96
        riskLevel:
          type: string
          description: 위험도
          enum:
            - 정상
            - 주의
            - 위험
            - 미응답
          example: 정상
        riskReason:
          type: string
          description: 위험도 판단 사유
          example: 특별한 건강 우려 사항 없음.
        summary:
          type: string
          description: 통화 요약
          example: 현재 건강 상태는 양호함.
        conversation:
          type: array
          description: 대화 내용
          items:
            $ref: '#/components/schemas/ConversationMessage'
        createdAt:
          type: string
          description: 생성일 또는 정렬 기준 시각
          example: '2026-05-27'
    ConversationMessage:
      type: object
      required:
        - speaker
        - text
      properties:
        speaker:
          type: string
          description: 화자
          example: AI
        text:
          type: string
          description: 발화 내용
          example: 안녕하세요 박지상님. 오늘 식사는 하셨나요?
