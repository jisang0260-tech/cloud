openapi: 3.0.1
info:
  title: Carecall Recording and Recipient API
  version: "2026-06-07"
  description: |
    오늘 통화 현황, 통화 이력, 대상자 삭제, 녹음 presigned URL 발급 API 명세입니다.
    `today status`와 `call history` 응답 record에는 녹음 접근용 `recordingS3Key`, `recordingS3Bucket` 필드가 추가되어 있습니다.

servers:
  - url: https://esv5aiiwjg.execute-api.us-east-1.amazonaws.com/{basePath}
    description: Deployed API Gateway endpoint
    variables:
      basePath:
        default: khu

tags:
  - name: Calls
    description: 통화 현황 및 이력
  - name: Recipients
    description: 대상자 관리
  - name: Recordings
    description: 녹음 파일 접근

paths:
  /api/calls/today:
    get:
      tags:
        - Calls
      summary: 오늘 통화 현황 조회
      description: |
        특정 날짜의 통화 현황을 조회합니다.
        각 record에는 녹음 presigned URL 발급에 사용할 `recordingS3Key`, `recordingS3Bucket`이 함께 내려갑니다.
      operationId: fetchTodayCallStatus
      parameters:
        - name: date
          in: query
          required: false
          description: 조회 날짜 (YYYY-MM-DD). 없으면 오늘 날짜를 사용합니다.
          schema:
            type: string
            format: date
          example: "2026-06-07"
      responses:
        "200":
          description: 오늘 통화 현황 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayStatusResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/calls/history/{recipientName}:
    get:
      tags:
        - Calls
      summary: 대상자 통화 이력 조회
      description: |
        특정 대상자 이름 기준으로 통화 이력을 조회합니다.
        각 history record에는 녹음 presigned URL 발급에 사용할 `recordingS3Key`, `recordingS3Bucket`이 함께 내려갑니다.
      operationId: fetchCallHistory
      parameters:
        - name: recipientName
          in: path
          required: true
          description: 조회할 대상자 이름
          schema:
            type: string
          example: 나형율
      responses:
        "200":
          description: 통화 이력 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallHistoryResponse"
        "400":
          description: 요청값 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/recipients/{recipientId}:
    delete:
      tags:
        - Recipients
      summary: 대상자 삭제
      description: |
        users 테이블의 대상자 row를 실제 삭제합니다.
        call-history는 삭제하지 않습니다.
      operationId: deleteRecipient
      parameters:
        - name: recipientId
          in: path
          required: true
          description: 삭제할 대상자의 recipientId
          schema:
            type: string
          example: r-09f636a71ef6
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  value:
                    status: success
        "404":
          description: 대상자 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: Recipient not found
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/recordings/url:
    get:
      tags:
        - Recordings
      summary: 녹음 presigned URL 발급
      description: |
        S3 object key를 받아 녹음 파일 접근용 presigned URL을 발급합니다.
        `bucket`이 없으면 Lambda 환경변수 `RECORDINGS_BUCKET` 기본값을 사용합니다.
      operationId: getRecordingPresignedUrl
      parameters:
        - name: key
          in: query
          required: true
          description: 녹음 파일의 S3 object key
          schema:
            type: string
          example: connect/khucloud/CallRecordings/ivr/2026/06/07/fa593b96-dd3b-402a-ba5e-d86e50dffb86_20260607T11:01_UTC.wav
        - name: bucket
          in: query
          required: false
          description: 녹음 파일이 들어있는 S3 bucket 이름
          schema:
            type: string
          example: carecall
        - name: download
          in: query
          required: false
          description: true이면 다운로드용 링크로 반환합니다.
          schema:
            type: boolean
          example: true
      responses:
        "200":
          description: presigned URL 발급 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingPresignedUrlResponse"
        "400":
          description: 요청값 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingKey:
                  value:
                    error: key is required
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bucketMissing:
                  value:
                    error: Recordings bucket is not configured

components:
  schemas:
    TodayStatusResponse:
      type: object
      required:
        - date
        - total
        - riskCounts
        - records
      properties:
        date:
          type: string
          format: date
        total:
          type: integer
        riskCounts:
          type: object
          properties:
            정상:
              type: integer
            주의:
              type: integer
            위험:
              type: integer
            미응답:
              type: integer
        records:
          type: array
          items:
            $ref: "#/components/schemas/CallRecord"

    CallHistoryResponse:
      type: object
      required:
        - recipientName
        - history
      properties:
        recipientName:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/CallRecord"

    CallRecord:
      type: object
      required:
        - contactId
        - recipientId
        - recipientName
        - status
        - callTime
        - riskLevel
        - recordingS3Key
        - recordingS3Bucket
      properties:
        contactId:
          type: string
        recipientId:
          type: string
        recipientName:
          type: string
        status:
          type: string
        duration:
          type: integer
          nullable: true
        callTime:
          type: string
          format: date-time
        sentiment:
          type: string
          nullable: true
        sentimentScore:
          type: integer
          nullable: true
        riskLevel:
          type: string
        riskReason:
          type: string
        summary:
          type: string
        conversation:
          type: array
          items:
            type: object
        createdAt:
          type: string
        recordingS3Key:
          type: string
          description: 녹음 파일 S3 object key
        recordingS3Bucket:
          type: string
          description: 녹음 파일 S3 bucket 이름

    RecordingPresignedUrlResponse:
      type: object
      required:
        - bucket
        - key
        - expiresIn
        - download
        - url
      properties:
        bucket:
          type: string
          description: presigned URL 생성에 사용된 버킷
          example: carecall
        key:
          type: string
          description: 녹음 파일 S3 object key
        expiresIn:
          type: integer
          description: presigned URL 만료 시간(초)
          example: 300
        download:
          type: boolean
          description: 다운로드용 링크 여부
        url:
          type: string
          format: uri
          description: presigned URL

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
