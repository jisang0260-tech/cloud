openapi: 3.0.1
info:
  title: Carecall Recipient and Recording API
  version: "2026-06-07"
  description: |
    대상자 수정/삭제와 녹음 presigned URL 발급 API 명세입니다.

servers:
  - url: https://esv5aiiwjg.execute-api.us-east-1.amazonaws.com/{basePath}
    description: Deployed API Gateway endpoint
    variables:
      basePath:
        default: khu

tags:
  - name: Recipients
    description: 대상자 관리
  - name: Recordings
    description: 녹음 파일 접근

paths:
  /api/recipients/{recipientId}:
    put:
      tags:
        - Recipients
      summary: 대상자 정보 수정
      description: |
        기존 대상자 정보를 수정합니다.
        `recipientName`이 실제로 변경되면 해당 `recipientId`의 기존 call-history `recipientName`도 함께 동기화됩니다.
      operationId: updateRecipient
      parameters:
        - name: recipientId
          in: path
          required: true
          description: 수정할 대상자의 recipientId
          schema:
            type: string
          example: r-09f636a71ef6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipientRequest"
            examples:
              updatePhoneAndTime:
                value:
                  phoneNumber: 010-9999-8888
                  autoCallTime: "10:00"
                  autoCallEnabled: true
              updateName:
                value:
                  recipientName: 박지상
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  value:
                    status: success
        "400":
          description: 요청값 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidBody:
                  value:
                    error: At least one updatable field is required.
        "404":
          description: 대상자 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: Recipient not found
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Recipients
      summary: 대상자 삭제
      description: |
        users 테이블의 대상자 row를 실제 삭제합니다.
        call-history는 삭제하지 않습니다.
      operationId: deleteRecipient
      parameters:
        - name: recipientId
          in: path
          required: true
          description: 삭제할 대상자의 recipientId
          schema:
            type: string
          example: r-09f636a71ef6
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  value:
                    status: success
        "404":
          description: 대상자 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: Recipient not found
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/recordings/url:
    get:
      tags:
        - Recordings
      summary: 녹음 presigned URL 발급
      description: |
        S3 object key를 받아 녹음 파일 접근용 presigned URL을 발급합니다.
        `bucket`이 없으면 Lambda 환경변수 `RECORDINGS_BUCKET` 기본값을 사용합니다.
      operationId: getRecordingPresignedUrl
      parameters:
        - name: key
          in: query
          required: true
          description: 녹음 파일의 S3 object key
          schema:
            type: string
          example: connect/khucloud/CallRecordings/ivr/2026/06/07/fa593b96-dd3b-402a-ba5e-d86e50dffb86_20260607T11:01_UTC.wav
        - name: bucket
          in: query
          required: false
          description: 녹음 파일이 들어있는 S3 bucket 이름
          schema:
            type: string
          example: carecall
        - name: download
          in: query
          required: false
          description: true이면 다운로드용 링크로 반환
          schema:
            type: boolean
          example: true
      responses:
        "200":
          description: presigned URL 발급 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordingPresignedUrlResponse"
              examples:
                success:
                  value:
                    bucket: carecall
                    key: connect/khucloud/CallRecordings/ivr/2026/06/07/fa593b96-dd3b-402a-ba5e-d86e50dffb86_20260607T11:01_UTC.wav
                    expiresIn: 300
                    download: true
                    url: https://carecall.s3.amazonaws.com/connect/khucloud/CallRecordings/ivr/2026/06/07/fa593b96-dd3b-402a-ba5e-d86e50dffb86_20260607T11%3A01_UTC.wav?...
        "400":
          description: 요청값 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingKey:
                  value:
                    error: key is required
        "500":
          description: 서버 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                bucketMissing:
                  value:
                    error: Recordings bucket is not configured

components:
  schemas:
    UpdateRecipientRequest:
      type: object
      description: 수정할 필드만 포함하면 됩니다.
      properties:
        recipientName:
          type: string
          description: 대상자 이름
        age:
          type: integer
          minimum: 0
          description: 대상자 나이
        phoneNumber:
          type: string
          description: 대상자 전화번호
          example: 010-1234-5678
        address:
          type: string
          description: 대상자 주소
        memo:
          type: string
          description: 메모
        autoCallTime:
          type: string
          pattern: "^[0-9]{2}:[0-9]{2}$"
          description: 자동 발신 시간 (HH:MM)
          example: "09:00"
        autoCallEnabled:
          type: boolean
          description: 자동 발신 사용 여부

    RecordingPresignedUrlResponse:
      type: object
      required:
        - bucket
        - key
        - expiresIn
        - download
        - url
      properties:
        bucket:
          type: string
          description: presigned URL 생성에 사용된 버킷
          example: carecall
        key:
          type: string
          description: 녹음 파일 S3 object key
        expiresIn:
          type: integer
          description: presigned URL 만료 시간(초)
          example: 300
        download:
          type: boolean
          description: 다운로드용 링크 여부
        url:
          type: string
          format: uri
          description: presigned URL

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
